# Bereitstellung auf GitHub Pages — bei jedem Push auf main:
# Tests + Typecheck + Build, dann dist/ auf den Branch gh-pages pushen
# (Pages-Quelle; die Anlage des Branches aktiviert Pages automatisch).
# Die App ist lokal-first: Pages liefert nur statische Dateien aus,
# alle Gesundheitsdaten bleiben im Browser (IndexedDB).
name: Deploy (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Auf gh-pages veröffentlichen
        run: |
          touch dist/.nojekyll
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
